  - name: "Windows USN Journal (Regex Normalized)"
    description: "NTFS update sequence number journal stream"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]\\$Extend[\\/]\\$UsnJrnl$'
        regexp: true
    parser: "usnjrnl"
    tag: "filesystem"
    category: "system"

  - name: "Windows Master File Table (Regex Normalized)"
    description: "Primary NTFS metadata table"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]\\$MFT$'
        regexp: true
    parser: "mft"
    tag: "filesystem"
    category: "system"

  - name: "Windows Recycle Bin Records and Payloads"
    description: "Recycle metadata and deleted file payload entries"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]\\$Recycle\.Bin[\\/][^\\/]+[\\/]\\$I.*$'
        regexp: true
      - path: '(?i)^([A-Z]:)?[\\/]\\$Recycle\.Bin[\\/][^\\/]+[\\/]\\$R.*$'
        regexp: true
    parser: "recycle_bin"
    tag: "filesystem"
    category: "users"

  - name: "Windows Search Database"
    description: "Windows Search index ESE database"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]ProgramData[\\/]Microsoft[\\/]Search[\\/]Data[\\/]Applications[\\/]Windows[\\/]Windows\.edb$'
        regexp: true
    parser: "windows_search_edb"
    tag: "database"
    category: "application"

  - name: "Windows Thumbcache and Iconcache"
    description: "Thumbnail and icon caches evidencing viewed media/files"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]Users[\\/][^\\/]+[\\/]AppData[\\/]Local[\\/]Microsoft[\\/]Windows[\\/]Explorer[\\/](thumbcache_[^\\/]+\.db|iconcache_[^\\/]+\.db)$'
        regexp: true
    parser: "thumbcache"
    tag: "media"
    category: "media"

  - name: "Windows SetupAPI Device Logs"
    description: "Hardware installation and driver setup logs"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]Windows[\\/]INF[\\/]setupapi\.(dev|app)\.log$'
        regexp: true
    parser: "setupapi_log"
    tag: "device"
    category: "system"

  - name: "Windows CBS Servicing Logs"
    description: "Component-based servicing activity and update operations"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]Windows[\\/]Logs[\\/]CBS[\\/]CBS\.log$'
        regexp: true
    parser: "cbs_log"
    tag: "logs"
    category: "system"

  - name: "Windows OneDrive Client Logs"
    description: "Sync activity and account interaction logs for OneDrive client"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]Users[\\/][^\\/]+[\\/]AppData[\\/]Local[\\/]Microsoft[\\/]OneDrive[\\/]logs[\\/].+$'
        regexp: true
    parser: "onedrive_logs"
    tag: "cloud"
    category: "application"

  - name: "Windows Default RDP Connection File"
    description: "Default .rdp file with remote host and client options"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]Users[\\/][^\\/]+[\\/]Documents[\\/]Default\.rdp$'
        regexp: true
    parser: "rdp_default"
    tag: "network"
    category: "users"

  - name: "Windows Defender Quarantine Entries"
    description: "Quarantined malware metadata and item records"
    paths:
      - path: '(?i)^([A-Z]:)?[\\/]ProgramData[\\/]Microsoft[\\/]Windows Defender[\\/]Quarantine[\\/]Entries[\\/].+$'
        regexp: true
    parser: "defender_quarantine"
    tag: "security"
    category: "system"
